spring:
  application:
    name: fintech-transaction-engine

  datasource:
    url: jdbc:h2:mem:fintech_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    com.fintech: DEBUG
    org.springframework.web: INFO