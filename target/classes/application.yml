spring:
  application:
    name: fintech-transaction-engine

  datasource:
    url: jdbc:h2:mem:fintech_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  sql:
    init:
      mode: never

server:
  port: 8080

logging:
  level:
    com.fintech: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO